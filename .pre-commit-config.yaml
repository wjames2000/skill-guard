# .pre-commit-config.yaml
repos:
  - repo: https://github.com/wjames2000/skill-guard
    rev: v0.1.0
    hooks:
      - id: skill-guard
        name: skill-guard security scan
        description: "Scan staged files for security risks before commit"
        entry: skill-guard
        language: system
        types: [text]
        args: ["--severity", "high", "--quiet"]
