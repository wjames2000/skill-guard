name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: chmod +x scripts/build.sh && bash scripts/build.sh
      - uses: softprops/action-gh-release@v1
        with:
          files: dist/*
